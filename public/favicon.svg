<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Deep background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1f5c"/>
      <stop offset="100%" stop-color="#060a14"/>
    </linearGradient>

    <!-- Blue glow gradient for the N strokes -->
    <linearGradient id="nGrad" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4a7fff"/>
      <stop offset="60%" stop-color="#1a3a8f"/>
      <stop offset="100%" stop-color="#0d2060"/>
    </linearGradient>

    <!-- Orange accent gradient -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c3a"/>
      <stop offset="100%" stop-color="#e8651a"/>
    </linearGradient>

    <!-- Glow filter for strokes -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tighter glow for nodes -->
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- Subtle inner border ring -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.5" fill="none"
        stroke="#1a3a8f" stroke-width="0.5" stroke-opacity="0.6"/>

  <!-- ── N LETTERFORM ──
       Three geometric pieces: left bar, right bar, diagonal slash.
       Bars are 4px wide; diagonal is a parallelogram connecting
       top-left bar to bottom-right bar.
  -->

  <!-- Left vertical bar -->
  <rect x="6" y="6" width="4" height="20" rx="1.5" fill="url(#nGrad)" filter="url(#glow)"/>

  <!-- Right vertical bar -->
  <rect x="22" y="6" width="4" height="20" rx="1.5" fill="url(#nGrad)" filter="url(#glow)"/>

  <!-- Diagonal stroke: top-left corner → bottom-right corner -->
  <polygon points="10,6 14,6 22,26 18,26" fill="url(#nGrad)" filter="url(#glow)"/>

  <!-- ── NODE DOTS at structural corners (AI / neural network accent) ── -->

  <!-- Top-left: orange accent node -->
  <circle cx="8" cy="6.5" r="2.2" fill="url(#accentGrad)" filter="url(#nodeGlow)"/>

  <!-- Top-right: blue node -->
  <circle cx="24" cy="6.5" r="2.2" fill="#5b8fff" filter="url(#nodeGlow)"/>

  <!-- Bottom-left: blue node -->
  <circle cx="8" cy="25.5" r="2.2" fill="#5b8fff" filter="url(#nodeGlow)"/>

  <!-- Bottom-right: orange accent node -->
  <circle cx="24" cy="25.5" r="2.2" fill="url(#accentGrad)" filter="url(#nodeGlow)"/>

  <!-- Mid-diagonal: small white pulse node -->
  <circle cx="16" cy="16" r="1.5" fill="#ffffff" fill-opacity="0.92" filter="url(#nodeGlow)"/>
</svg>
