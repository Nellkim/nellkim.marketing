name: Deploy to Azure App Service

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp server.js deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cd deploy
          npm ci --omit=dev
          cd ..
          cd deploy && zip -qr ../deploy.zip . && cd ..

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name nellkim \
            --resource-group nellkim-rg \
            --subscription 496e71ce-f4e6-4652-9d0f-40bec5027f65 \
            --src-path deploy.zip \
            --type zip \
            --async true
